<div *ngIf="isOpen" class="fixed inset-0 z-50 flex items-center justify-center bg-black/40">

  <div class="bg-white w-full rounded-xl shadow-lg border border-blue-100 flex flex-col" [ngClass]="modalSize">
    <!-- HEADER -->
    <div class="flex items-center justify-between p-6 border-b">

      <div>
        <h2 class="text-lg font-bold text-slate-800">
          {{title}}
        </h2>

        <p *ngIf="subtitle" class="text-sm text-slate-500">
          {{subtitle}}
        </p>
      </div>

      <button (click)="close()" class="text-slate-400 hover:text-slate-600 text-xl">
        ✕
      </button>

    </div>
    <!-- BODY -->
    <div class="p-6 overflow-y-auto max-h-[70vh]">

      <ng-content></ng-content>
    </div>
    <!-- FOOTER -->
    <div *ngIf="showFooter" class="flex justify-end gap-3 p-6 border-t">
      <button *ngIf="showCancel" (click)="cancel.emit()" class="px-4 py-2 text-sm border rounded-lg hover:bg-slate-50">
        {{cancelText}}
      </button>
      <button *ngIf="showConfirm" (click)="confirm.emit()"
        class="px-4 py-2 text-sm rounded-lg bg-blue-600 text-white hover:bg-blue-700">
        {{confirmText}}
      </button>
    </div>
  </div>
</div>
