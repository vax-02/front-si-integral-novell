<div class="max-w-3xl mx-auto space-y-6">

  <!-- HEADER -->
  <div class="bg-white p-6 rounded-2xl shadow-lg flex items-center justify-between">
    <div>
      <h2 class="text-xl font-bold text-slate-800">Seguridad</h2>
      <p class="text-sm text-slate-500">Actualiza tu contraseña de acceso</p>
    </div>

    <i class="fa-solid fa-lock text-blue-600 text-xl"></i>
  </div>

  <!-- FORM -->
  <div class="bg-white p-6 rounded-2xl shadow-lg space-y-6">

    <h3 class="text-lg font-semibold text-slate-700 border-l-4 border-blue-500 pl-3">
      Cambiar Contraseña
    </h3>

    <div class="grid gap-4">

      <!-- ACTUAL -->
      <div>
        <label class="text-sm text-slate-500">Contraseña actual</label>
        <input type="password"
          class="w-full mt-1 px-4 py-2.5 rounded-xl border border-slate-300 focus:ring-2 focus:ring-blue-500 shadow-sm transition"
          placeholder="••••••••">
      </div>

      <!-- NUEVA -->
      <div>
        <label class="text-sm text-slate-500">Nueva contraseña</label>
        <input type="password"
          class="w-full mt-1 px-4 py-2.5 rounded-xl border border-slate-300 focus:ring-2 focus:ring-blue-500 shadow-sm transition"
          placeholder="••••••••">
      </div>

      <!-- CONFIRMAR -->
      <div>
        <label class="text-sm text-slate-500">Confirmar contraseña</label>
        <input type="password"
          class="w-full mt-1 px-4 py-2.5 rounded-xl border border-slate-300 focus:ring-2 focus:ring-blue-500 shadow-sm transition"
          placeholder="••••••••">
      </div>

    </div>

    <!-- BOTÓN -->
    <div class="flex justify-end">
      <button
        class="px-6 py-2.5 rounded-xl bg-blue-600 text-white font-semibold hover:bg-blue-700 transition shadow">
        Guardar Cambios
      </button>
    </div>

  </div>

</div>
