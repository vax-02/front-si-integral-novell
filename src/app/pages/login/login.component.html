<div class="min-h-screen flex bg-gradient-to-br from-blue-800 via-blue-700 to-indigo-800">

  <!-- IZQUIERDA - LOGIN -->
  <div class="w-full md:w-[40%] flex items-center justify-center px-6 py-12">

    <div class="w-[80%] max-w-md">

      <!-- Logo / Marca -->
      <div class="mb-10 text-center">
        <h1 class="text-4xl font-serif font-bold text-white tracking-tight">
          Bienvenido
        </h1>
        <p class="text-blue-200 text-sm mt-2">
          Instituto Técnico Superior Novell
        </p>
        <div class="w-16 h-1 bg-blue-400 mx-auto mt-4 rounded-full"></div>
      </div>

      <!-- Card -->
      <div class="bg-white rounded-2xl shadow-2xl p-8 space-y-6 border border-white/20">

        <h2 class="text-xl font-bold text-slate-800 text-center">
          Iniciar Sesión
        </h2>

        <form class="space-y-5">

          <!-- Email -->
          <div>
            <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">
              Correo electrónico
            </label>
            <input type="email" placeholder="ejemplo@email.com"
              class="w-full px-4 py-3 border border-slate-200 rounded-lg
                     focus:ring-2 focus:ring-blue-600 focus:border-blue-600
                     transition-all outline-none bg-slate-50 focus:bg-white" />
          </div>

          <!-- Password -->
          <div>
            <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">
              Contraseña
            </label>
            <input type="password" placeholder="••••••••"
              class="w-full px-4 py-3 border border-slate-200 rounded-lg
                     focus:ring-2 focus:ring-blue-600 focus:border-blue-600
                     transition-all outline-none bg-slate-50 focus:bg-white" />
          </div>

          <!-- Botón -->
          <button type="submit"
            class="w-full bg-blue-800 text-white py-3 rounded-lg font-bold
                   hover:bg-blue-700 active:scale-95 transition-all duration-300
                   shadow-lg shadow-blue-900/30">
            Entrar al Sistema
          </button>

          <!-- Links -->
          <div class="flex justify-between text-xs pt-2">
            <a class="text-slate-500 hover:text-blue-700 cursor-pointer transition-colors">
              ¿Olvidaste tu contraseña?
            </a>
          </div>

        </form>
      </div>

      <!-- Footer pequeño -->
      <p class="text-center text-blue-200 text-xs mt-8">
        © 2026 Instituto Técnico Superior Novell
      </p>

    </div>
  </div>

  <!-- DERECHA - IMAGEN -->
  <div class="hidden md:block md:w-[60%] relative overflow-hidden">

    <img src="https://images.unsplash.com/photo-1523240715181-310f9d7a5738?q=80&w=2070"
      class="absolute inset-0 w-full h-full object-cover">

    <div class="absolute inset-0 bg-gradient-to-br from-blue-900/80 via-blue-800/70 to-indigo-900/80"></div>

    <!-- Decoración -->
    <div class="absolute bottom-10 left-10 text-white max-w-sm">
      <h3 class="text-3xl font-serif font-bold mb-4 leading-tight">
        Formación que impulsa tu futuro profesional
      </h3>
      <div class="w-12 h-1 bg-blue-400"></div>
    </div>

  </div>

</div>
